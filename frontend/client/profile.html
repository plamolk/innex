<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="INNEX Innovation Profile — โปรไฟล์นวัตกรรม ผลงาน และประวัติการหาทีม">

    <!-- Google Fonts: Outfit & Prompt -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- FOUC Prevention: Apply saved theme BEFORE paint -->
    <script>
        (function () {
            try {
                const t = localStorage.getItem('theme');
                if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                }
            } catch (e) { }
        })();
    </script>

    <!-- Tailwind CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkblue: '#293681',
                        royalblue: '#4274D9',
                        lightblue: '#95CCDD',
                        accent: '#D07E66',
                        bglight: '#f6f9fc',
                        bgteal: '#D0E7E6',
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Shared JS -->
    <script src="../src/js/theme.js"></script>
    <script src="../src/js/i18n.js"></script>

    <title>Innovation Profile — INNEX</title>

    <style>
        /* Base Typography */
        body { font-family: 'Outfit', sans-serif; }
        body:lang(th) { font-family: 'Prompt', 'Outfit', sans-serif; }

        /* Wavy Pattern Background */
        .wave-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            opacity: 0.45;
            pointer-events: none;
            background-color: #D0E7E6;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='wave' x='0' y='0' width='120' height='24' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 12 Q 30 24 60 12 T 120 12' fill='none' stroke='%2395CCDD' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect x='0' y='0' width='100%25' height='100%25' fill='url(%23wave)'/%3E%3C/svg%3E");
        }

        .dark .wave-bg {
            background-color: #0f172a;
            opacity: 0.15;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='wave' x='0' y='0' width='120' height='24' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 12 Q 30 24 60 12 T 120 12' fill='none' stroke='%23293681' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect x='0' y='0' width='100%25' height='100%25' fill='url(%23wave)'/%3E%3C/svg%3E");
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 7px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #95CCDD; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4274D9; }

        /* Tab active border transition */
        .tab-btn {
            position: relative;
            transition: color 0.2s ease;
        }
        .tab-btn::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 3px;
            background-color: #4274D9;
            transform: scaleX(0);
            transition: transform 0.2s ease;
            border-radius: 3px 3px 0 0;
        }
        .tab-btn.active {
            color: #4274D9;
            font-weight: 700;
        }
        .dark .tab-btn.active {
            color: #95CCDD;
        }
        .tab-btn.active::after {
            transform: scaleX(1);
        }
        .dark .tab-btn.active::after {
            background-color: #95CCDD;
        }

        /* Card Hover Effects */
        .portfolio-card, .recruit-post-card {
            transition: box-shadow 0.3s ease, transform 0.3s ease, border-color 0.3s ease;
        }
        .portfolio-card:hover, .recruit-post-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(41, 54, 129, 0.08);
            border-color: #95CCDD;
        }
        .dark .portfolio-card:hover, .dark .recruit-post-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            border-color: #4274D9;
        }
    </style>
</head>

    <!-- ===== PAGE MODULE ===== -->
    <script>
    (function () {
        'use strict';

        /* ============================================================
           DATA
        ============================================================ */
        const PROFILE_DATA = {
            skills: {
                hacker: 90,
                hustler: 50,

            },
            expertiseTags: [

                { label: 'IoT', icon: 'fas fa-microchip' },
                { label: 'UX/UI', icon: 'fas fa-pen-nib' },
            ],
            portfolio: [
                {
                    id: 'p1',
                    title: 'Smart City Dashboard',
                    description: 'ระบบแสดงผลข้อมูลการใช้พลังงานของเมืองแบบเรียลไทม์ สร้างเพื่อวิเคราะห์การใช้ทรัพยากรในเขตเทศบาล',
                    tags: ['React', 'D3.js', 'Node.js'],
                    thumb: 'https://images.unsplash.com/photo-1551288049-bebda4e38f71?auto=format&fit=crop&q=80&w=800',
                },
                {

                    title: 'IoT Plant Monitor',
                    description: 'ระบบดูแลต้นไม้อัตโนมัติผ่านเซ็นเซอร์วัดความชื้นและแสงสว่าง แจ้งเตือนผ่านแอปพลิเคชันมือถือ',
                    tags: ['Python', 'IoT', 'Hardware'],
                    thumb: 'https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&q=80&w=800',
                },
                {
                    id: 'p3',
                    title: 'E-Commerce App Redesign',
                    description: 'ออกแบบประสบการณ์ผู้ใช้ (UX) ใหม่สำหรับแอปพลิเคชันซื้อขายของมือสอง เน้นความง่ายในการใช้งาน',
                    tags: ['Figma', 'UX Research'],
                    thumb: 'https://images.unsplash.com/photo-1618761714954-0b8cd0026356?auto=format&fit=crop&q=80&w=800',
                },
                {
                    id: 'p4',
                    title: 'FinTech Platform Prototype',
                    description: 'ต้นแบบแพลตฟอร์มการกู้ยืมเงินรายย่อยแบบ Peer-to-peer สำหรับนักศึกษา',
                    tags: ['Next.js', 'FinTech'],
                    thumb: 'https://images.unsplash.com/photo-1551033406-611cf9a28f67?auto=format&fit=crop&q=80&w=800',
                },
            ],
            recruitmentPosts: [
                {
                    id: 'r1',
                    type: 'looking-for-team',
                    typeLabel: 'กำลังหาทีม',
                    typeIcon: 'fas fa-search',
                    event: 'National Hackathon 2026',
                    eventIcon: 'fas fa-flag',
                    summary: 'ตามหาทีมที่ขาด Full-stack Developer (React/Node) หรือมีความสนใจทำโปรเจกต์ด้าน Smart City & IoT ครับ พร้อมเริ่มงานทันที',
                    date: '15 มี.ค. 2026',
                    status: 'open',
                    statusLabel: 'กำลังหา',
                },
                {
                    id: 'r2',
                    type: 'looking-for-members',
                    typeLabel: 'หาสมาชิกเพิ่ม',
                    typeIcon: 'fas fa-user-plus',
                    event: 'FinTech Ideathon 2025',
                    eventIcon: 'fas fa-landmark',
                    summary: 'ทีมเราขาด Hustler ที่สามารถวิเคราะห์ Business Model และทำ Pitch Deck เก่งๆ มาร่วมชิงรางวัลหมวด FinTech ครับ',
                    date: '2 ต.ค. 2025',
                    status: 'closed',
                    statusLabel: 'ได้ทีมแล้ว',
                },
            ],
        };

        /* ============================================================
           RENDERERS
        ============================================================ */

        function renderExpertiseTags() {
            const container = document.getElementById('expertise-tags');
            if (!container) return;

            container.innerHTML = PROFILE_DATA.expertiseTags.map(tag => `
                <span class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-gray-100 dark:bg-gray-700 text-gray-800 dark:text-gray-200 text-sm font-semibold border border-gray-200 dark:border-gray-600 shadow-sm">
                    <i class="${tag.icon} text-royalblue dark:text-lightblue"></i>
                    ${tag.label}
                </span>
            `).join('');
        }

        function renderPortfolioGrid() {
            const grid = document.getElementById('showcase-grid');
            if (!grid) return;

            if (PROFILE_DATA.portfolio.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">ไม่มีผลงานแสดง</div>`;
                return;
            }

            grid.innerHTML = PROFILE_DATA.portfolio.map(item => `
                <article class="portfolio-card flex flex-col bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl overflow-hidden cursor-pointer h-full">
                    <div class="aspect-video w-full overflow-hidden bg-gray-100 relative group">
                        <img src="${item.thumb}" alt="${item.title}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" loading="lazy">
                        <div class="absolute inset-0 bg-darkblue/10 group-hover:bg-transparent transition-colors"></div>
                    </div>
                    <div class="p-6 flex-1 flex flex-col justify-between gap-4">
                        <div>
                            <h3 class="font-bold text-xl text-darkblue dark:text-white mb-2 leading-snug group-hover:text-royalblue transition-colors">${item.title}</h3>
                            <p class="text-sm text-gray-600 dark:text-gray-400 leading-relaxed">${item.description}</p>
                        </div>
                        <div class="flex flex-wrap gap-2 pt-2 border-t border-gray-100 dark:border-gray-700">
                            ${item.tags.map(t => `<span class="px-2.5 py-1 rounded-md bg-bglight dark:bg-gray-700 text-gray-700 dark:text-gray-300 text-xs font-semibold border border-gray-200 dark:border-gray-600">${t}</span>`).join('')}

                    </div>
                </article>

        }

        function renderRecruitmentPosts() {
            const list = document.getElementById('recruitment-list');
            if (!list) return;

            if (PROFILE_DATA.recruitmentPosts.length === 0) {
                list.innerHTML = `<div class="text-center py-12 text-gray-500">ไม่มีประวัติการตั้งโพสต์</div>`;
                return;
            }

            list.innerHTML = PROFILE_DATA.recruitmentPosts.map(post => {
                const isOpen = post.status === 'open';
                const typeColor = post.type === 'looking-for-team' 
                    ? 'text-royalblue bg-royalblue/10 border-royalblue/20' 
                    : 'text-darkblue bg-darkblue/10 border-darkblue/20';
                
                const statusColor = isOpen 
                    ? 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 border-green-200' 
                    : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400 border-gray-200';

                return `
                <article class="recruit-post-card bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-2xl p-6 relative">
                    
                    <!-- Header -->
                    <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
                        <div class="flex items-center gap-3">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg border text-sm font-bold ${typeColor} dark:text-white dark:bg-gray-700 dark:border-gray-600">
                                <i class="${post.typeIcon}"></i> ${post.typeLabel}
                            </span>
                            <span class="inline-flex items-center gap-1.5 px-2.5 py-1.5 rounded-lg border text-xs font-semibold ${statusColor} dark:border-gray-600">
                                ${post.statusLabel}
                            </span>
                        </div>
                        <span class="text-sm text-gray-500 dark:text-gray-400 flex items-center gap-1.5">
                            <i class="fas fa-clock"></i> ${post.date}
                        </span>
                    </div>

                    <!-- Event -->
                    <div class="flex items-center gap-2 mb-3 px-4 py-2.5 bg-bglight dark:bg-gray-900/50 rounded-xl border border-gray-100 dark:border-gray-700">
                        <i class="${post.eventIcon} text-royalblue dark:text-lightblue"></i>
                        <span class="font-bold text-darkblue dark:text-white">${post.event}</span>
                    </div>

                    <!-- Content -->
                    <p class="text-gray-700 dark:text-gray-300 leading-relaxed text-base">
                        ${post.summary}
                    </p>
                </article>`;
            }).join('');
        }

        /* ============================================================
           INTERACTION & CHARTS
        ============================================================ */
        function initTabs() {
            const tabBtns = document.querySelectorAll('.tab-btn[data-tab]');
            const panels = {
                showcase: document.getElementById('panel-showcase'),
                recruitment: document.getElementById('panel-recruitment'),
            };

            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const target = btn.getAttribute('data-tab');

                    tabBtns.forEach(b => {
                        b.classList.remove('active');
                        b.setAttribute('aria-selected', 'false');
                    });
                    btn.classList.add('active');
                    btn.setAttribute('aria-selected', 'true');

                    Object.entries(panels).forEach(([key, panel]) => {
                        if (!panel) return;
                        if (key === target) {
                            panel.classList.remove('hidden');
                            panel.classList.add('block');
                        } else {
                            panel.classList.add('hidden');
                            panel.classList.remove('block');
                        }
                    });
                });
            });
        }

        function initRadarChart() {
            const canvas = document.getElementById('skillRadarChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            const isDark = () => document.documentElement.classList.contains('dark');
            const getGridColor  = () => isDark() ? '#374151' : '#e5e7eb';
            const getLabelColor = () => isDark() ? '#9ca3af' : '#4b5563';

            const chart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['Hacker', 'Hustler', 'Hipster'],
                    datasets: [{
                        label: 'Skill Level',
                        data: [
                            PROFILE_DATA.skills.hacker,
                            PROFILE_DATA.skills.hustler,
                            PROFILE_DATA.skills.hipster,
                        ],
                        backgroundColor: 'rgba(66, 116, 217, 0.2)', // royalblue with opacity
                        borderColor: '#4274D9', // royalblue
                        pointBackgroundColor: '#293681', // darkblue
                        pointBorderColor: '#ffffff',
                        pointHoverBackgroundColor: '#ffffff',
                        pointHoverBorderColor: '#4274D9',
                        pointRadius: 5,
                        pointHoverRadius: 7,
                        borderWidth: 3,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: {
                            min: 0,
                            max: 100,
                            angleLines: { color: getGridColor(), lineWidth: 1.5 },
                            grid:       { color: getGridColor(), lineWidth: 1.5 },
                            pointLabels: {
                                color: getLabelColor(),
                                font: { family: "'Outfit', sans-serif", size: 14, weight: '700' },
                                padding: 15
                            },
                            ticks: { display: false },
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: isDark() ? '#1f2937' : '#ffffff',
                            titleColor: isDark() ? '#ffffff' : '#111827',
                            bodyColor: getLabelColor(),
                            borderColor: getGridColor(),
                            borderWidth: 1,
                            padding: 12,
                            displayColors: false,
                            bodyFont: { size: 14, weight: 'bold' }
                        }
                    }
                }
            });

            const observer = new MutationObserver(() => {
                chart.options.scales.r.angleLines.color = getGridColor();
                chart.options.scales.r.grid.color = getGridColor();
                chart.options.scales.r.pointLabels.color = getLabelColor();
                chart.options.plugins.tooltip.backgroundColor = isDark() ? '#1f2937' : '#ffffff';
                chart.options.plugins.tooltip.titleColor = isDark() ? '#ffffff' : '#111827';
                chart.options.plugins.tooltip.bodyColor = getLabelColor();
                chart.options.plugins.tooltip.borderColor = getGridColor();
                chart.update('none');
            });
            observer.observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
        }

        /* ============================================================
           INIT
        ============================================================ */
        function init() {
            if (window.INNEX && typeof window.INNEX.loadComponents === 'function') {
                window.INNEX.loadComponents();
            }
            renderExpertiseTags();
            renderPortfolioGrid();
            renderRecruitmentPosts();
            initTabs();
            initRadarChart();
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    })();
    </script>
</body>
</html>
