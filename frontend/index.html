<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scalable Boilerplate - Dark Mode & i18n</title>
    
    <!-- Link to compiled Tailwind CSS (assuming a build step outputs to output.css) -->
    <!-- Note: For development without a build step, you might use the Tailwind CDN, but for production, use a compiled file. -->
    <link rel="stylesheet" href="css/output.css">

    <!-- 
        FOUC Prevention Script for Dark Mode
        Executes immediately, before the body renders, to apply the correct theme.
        This checks localStorage first, and falls back to the user's OS preference.
    -->
    <script>
        (function() {
            try {
                const storedTheme = localStorage.getItem('theme');
                if (storedTheme === 'dark' || (!storedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.classList.add('dark');
                } else {
                    document.documentElement.classList.remove('dark');
                }
            } catch (e) {
                console.error('Theme setting failed', e);
            }
        })();
    </script>
</head>
<body class="bg-bg-primary text-text-primary min-h-screen flex flex-col items-center justify-center transition-colors duration-300">

    <main class="max-w-3xl p-8 border border-gray-200 dark:border-gray-800 rounded-xl shadow-lg m-4 text-center bg-bg-primary">
        <header class="mb-8">
            <h1 class="text-4xl font-bold mb-4 text-text-primary" data-i18n="header.title">Loading...</h1>
            <p class="text-lg opacity-80 text-text-primary" data-i18n="header.subtitle">Loading...</p>
        </header>

        <div class="flex flex-col sm:flex-row gap-4 items-center justify-center mb-8">
            <!-- Theme Toggle Button -->
            <button id="theme-toggle" class="px-6 py-2 bg-btn-primary text-btn-text rounded-lg hover:opacity-90 font-semibold transition-opacity">
                <span data-i18n="controls.toggleTheme">Toggle Theme</span>
            </button>

            <!-- Language Switcher -->
            <div class="flex items-center gap-2">
                <label for="language-switcher" class="font-medium text-text-primary" data-i18n="controls.selectLanguage">Select Language:</label>
                <select id="language-switcher" class="px-3 py-2 border rounded-lg bg-bg-primary text-text-primary border-gray-300 dark:border-gray-700 outline-none">
                    <option value="en">English</option>
                    <option value="th">ไทย (Thai)</option>
                </select>
            </div>
        </div>

        <section>
            <p class="leading-relaxed text-text-primary" data-i18n="content.description">Loading content...</p>
        </section>
    </main>

    <!-- Application Logic Scripts -->
    <script src="src/js/theme.js"></script>
    <script src="src/js/i18n.js"></script>
</body>
</html>
