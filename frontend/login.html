<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Original CSS (kept for compatibility) -->
    <link rel="stylesheet" href="style/output.css">
    
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- AOS CSS for Animations -->
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <!-- Tailwind CDN for the custom colors and animations to work immediately -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkblue: '#293681',
                        royalblue: '#4274D9',
                        lightblue: '#95CCDD',
                        accent: '#D07E66', /* Adjusted from D07E6 to a soft warm color to fit the palette */
                        bglight: '#f6f9fc'
                    },
                    fontFamily: {
                        outfit: ['Outfit', 'sans-serif'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 6s ease-in-out infinite',
                        'float-delayed': 'float 6s ease-in-out 3s infinite',
                        'float-fast': 'float 4s ease-in-out infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-20px)' },
                        }
                    }
                }
            }
        }
    </script>
    
    <title>Login</title>
    
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #f6f9fc;
        }
        
        /* Wavy pattern background */
        .wave-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            opacity: 0.7;
            background-image: url("data:image/svg+xml,%3Csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3E%3Cdefs%3E%3Cpattern id='wave' x='0' y='0' width='120' height='24' patternUnits='userSpaceOnUse'%3E%3Cpath d='M0 12 Q 30 24 60 12 T 120 12' fill='none' stroke='%2395CCDD' stroke-width='1.5'/%3E%3C/pattern%3E%3C/defs%3E%3Crect x='0' y='0' width='100%25' height='100%25' fill='url(%23wave)'/%3E%3C/svg%3E");
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #95CCDD; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4274D9; 
        }
    </style>
</head>
<body class="relative min-h-screen flex flex-col text-darkblue overflow-x-hidden selection:bg-royalblue selection:text-white">
    
    <!-- Wavy Background Pattern -->
    <div class="wave-bg"></div>

    <!-- Animated Floating Background Elements -->
    <div class="absolute inset-0 overflow-hidden pointer-events-none z-0">
        
        <!-- Top Left Shape -->
        <div class="hidden sm:flex absolute top-16 left-8 md:top-32 md:left-24 animate-float" data-aos="fade-right" data-aos-delay="300" data-aos-duration="1500">
            <div class="w-16 h-16 md:w-24 md:h-24 bg-darkblue rounded-[2rem] rotate-12 opacity-95 shadow-2xl flex items-center justify-center border-4 border-white">
                <div class="w-8 h-8 rounded-full border-4 border-white border-t-transparent"></div>
            </div>
        </div>
        
        <!-- Top Right Shape (Paper Plane) -->
        <div class="hidden sm:block absolute top-24 right-8 md:top-40 md:right-32 animate-float-delayed" data-aos="fade-left" data-aos-delay="500" data-aos-duration="1500">
            <svg class="w-16 h-16 md:w-24 md:h-24 text-accent rotate-[-15deg] drop-shadow-2xl" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
            </svg>
        </div>
        
        <!-- Bottom Left Shape -->
        <div class="absolute bottom-20 left-4 md:bottom-32 md:left-32 animate-float-delayed" data-aos="fade-up-right" data-aos-delay="700" data-aos-duration="1500">
            <div class="w-20 h-20 md:w-32 md:h-32 bg-royalblue rounded-full opacity-95 shadow-2xl overflow-hidden relative border-4 border-white">
                <div class="absolute bottom-0 w-full h-1/2 bg-lightblue mix-blend-overlay"></div>
                <div class="absolute top-4 left-4 w-4 h-4 bg-white rounded-full"></div>
            </div>
        </div>
        
        <!-- Bottom Right Shape -->
        <div class="hidden sm:flex absolute bottom-10 right-8 md:bottom-24 md:right-40 animate-float-fast" data-aos="fade-up-left" data-aos-delay="900" data-aos-duration="1500">
            <div class="w-16 h-16 md:w-24 md:h-24 bg-lightblue border-4 border-white rounded-tl-full rounded-br-full rounded-tr-2xl rounded-bl-2xl shadow-xl flex items-center justify-center">
                <div class="w-6 h-6 bg-darkblue rounded-full"></div>
            </div>
        </div>

        <!-- Glowing Blobs -->
        <div class="absolute top-0 -left-10 w-96 h-96 bg-lightblue rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-blob"></div>
        <div class="absolute top-0 -right-10 w-96 h-96 bg-accent rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob" style="animation-delay: 2s;"></div>
        <div class="absolute -bottom-8 left-20 w-96 h-96 bg-royalblue rounded-full mix-blend-multiply filter blur-3xl opacity-20 animate-blob" style="animation-delay: 4s;"></div>
    </div>

    <!-- Header Section -->
    <header class="w-full px-6 md:px-12 py-8 flex justify-between items-center z-10" data-aos="fade-down" data-aos-duration="1000">
        <!-- Logo -->
        <div class="flex items-center space-x-3 cursor-pointer group">
            <div class="w-10 h-10 bg-darkblue rounded-tl-full rounded-bl-full rounded-tr-lg rounded-br-sm group-hover:bg-royalblue transition-colors duration-300 shadow-lg"></div>
            <span class="font-bold text-lg tracking-wide group-hover:text-royalblue transition-colors duration-300">/ Sales@lancerjob.au</span>
        </div>
        
        <!-- Desktop Nav -->
        <div class="hidden md:flex items-center space-x-8">
            <div class="flex items-center space-x-1 cursor-pointer hover:text-royalblue transition-colors bg-white/50 px-3 py-1.5 rounded-full backdrop-blur-sm border border-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
                <span class="text-sm font-bold">En</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" /></svg>
            </div>
            <a href="#" class="font-bold hover:text-royalblue transition-colors">Signup</a>
            <button class="bg-darkblue text-white px-8 py-3 rounded-xl font-bold hover:bg-royalblue hover:-translate-y-1 transition-all duration-300 shadow-lg shadow-darkblue/30">Request Demo</button>
        </div>
        
        <!-- Mobile Menu Icon -->
        <button id="mobile-menu-btn" class="md:hidden text-darkblue cursor-pointer bg-white/80 hover:bg-white p-2 rounded-lg backdrop-blur-sm transition-colors border border-gray-100 shadow-sm">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
        </button>
    </header>

    <!-- Mobile Dropdown Menu -->
    <div id="mobile-menu" class="hidden md:hidden absolute top-24 left-4 right-4 bg-white/95 backdrop-blur-xl rounded-2xl shadow-2xl border border-gray-100 z-50 p-6 flex-col space-y-4">
        <a href="#" class="font-bold text-darkblue hover:text-royalblue transition-colors block text-lg">Signup</a>
        <div class="flex items-center space-x-2 text-darkblue py-2 border-y border-gray-100">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 01-9 9m9-9a9 9 0 00-9-9m9 9H3m9 9a9 9 0 01-9-9m9 9c1.657 0 3-4.03 3-9s-1.343-9-3-9m0 18c-1.657 0-3-4.03-3-9s1.343-9 3-9m-9 9a9 9 0 019-9" /></svg>
            <span class="text-sm font-bold">Language: EN</span>
        </div>
        <button class="w-full bg-darkblue text-white px-8 py-3 rounded-xl font-bold hover:bg-royalblue transition-colors shadow-lg shadow-darkblue/20">Request Demo</button>
    </div>

    <!-- Main Login Content -->
    <main class="flex-grow flex items-center justify-center relative z-10 px-4 py-8">
        
        <!-- Login Card -->
        <div class="bg-white/90 backdrop-blur-xl p-8 md:p-12 rounded-[2.5rem] shadow-2xl shadow-darkblue/10 w-full max-w-[480px] border border-white relative overflow-hidden group" data-aos="zoom-in-up" data-aos-duration="1200">
            
            <!-- Subtle gradient inside card -->
            <div class="absolute top-0 right-0 w-40 h-40 bg-lightblue/10 rounded-bl-[4rem] -z-10 group-hover:scale-110 group-hover:bg-lightblue/20 transition-all duration-700"></div>

            <div class="text-center mb-10 relative">
                <h1 class="text-3xl md:text-[2.5rem] font-extrabold mb-4 text-darkblue tracking-tight">Login</h1>
                <p class="text-gray-500 text-sm md:text-base font-medium">Enter your details to get sign in<br>to your account</p>
            </div>

            <form>
                <div class="mb-5 md:mb-6">
                    <label class="block text-sm font-bold mb-2 text-darkblue" for="agency">Agency Name*</label>
                    <input type="text" id="agency" placeholder="Dstudio Agency Pvt Ltd." class="w-full px-5 py-3.5 md:py-4 rounded-2xl border-2 border-gray-100 bg-gray-50/50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-lightblue/30 focus:border-royalblue transition-all duration-300 placeholder-gray-400 font-medium text-darkblue" />
                </div>
                
                <div class="mb-6 md:mb-8">
                    <label class="block text-sm font-bold mb-2 text-darkblue" for="email">Business Email*</label>
                    <input type="email" id="email" placeholder="hello@dstudio.digital" class="w-full px-5 py-3.5 md:py-4 rounded-2xl border-2 border-gray-100 bg-gray-50/50 focus:bg-white focus:outline-none focus:ring-4 focus:ring-lightblue/30 focus:border-royalblue transition-all duration-300 placeholder-gray-400 font-medium text-darkblue" />
                </div>

                <div class="mb-8">
                    <p class="text-[13px] text-gray-500 leading-relaxed font-medium">
                        This information will be securely saved as per the <a href="#" class="font-bold text-darkblue hover:text-royalblue hover:underline transition-colors">Terms of Service</a> & <a href="#" class="font-bold text-darkblue hover:text-royalblue hover:underline transition-colors">Privacy Policy</a>
                    </p>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 sm:gap-4">
                    <button type="button" class="w-full sm:w-1/3 px-4 md:px-8 py-3.5 md:py-4 border-2 border-gray-200 rounded-2xl font-bold text-gray-600 hover:bg-gray-50 hover:border-gray-300 hover:text-darkblue transition-all duration-300 text-center">Help?</button>
                    <button type="submit" class="w-full sm:flex-grow bg-royalblue hover:bg-darkblue text-white py-3.5 md:py-4 rounded-2xl font-bold text-lg transition-all duration-300 shadow-xl shadow-royalblue/30 flex justify-center items-center hover:-translate-y-1">
                        Next Step
                    </button>
                </div>
            </form>
        </div>

    </main>

    <!-- Footer -->
    <footer class="w-full py-8 text-center text-sm font-semibold z-10 text-gray-500" data-aos="fade-up" data-aos-duration="1000" data-aos-delay="200">
        Copyright @lancerwork | <a href="#" class="hover:text-royalblue transition-colors">Privacy Policy</a>
    </footer>

    <!-- AOS JS Initialization -->
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        // AOS Initialization
        AOS.init({
            once: true,
            offset: 50,
            duration: 800,
            easing: 'ease-out-cubic',
        });

        // Mobile Menu Toggle Logic
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');

        mobileMenuBtn.addEventListener('click', () => {
            if (mobileMenu.classList.contains('hidden')) {
                mobileMenu.classList.remove('hidden');
                mobileMenu.classList.add('flex');
            } else {
                mobileMenu.classList.add('hidden');
                mobileMenu.classList.remove('flex');
            }
        });
    </script>
</body>
</html>
